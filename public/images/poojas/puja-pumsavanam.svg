<svg viewBox="0 0 800 600" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="gradient">
            <stop offset="0%" stop-color="#ca8a04"/>
            <stop offset="100%" stop-color="#eab308"/>
        </linearGradient>

        <!-- Saffron Color Palette -->
        <linearGradient id="saffron" x1="0%" y1="25%" x2="100%" y2="75%">
            <stop offset="0%" stop-color="#f97316"/>
            <stop offset="100%" stop-color="#881337"/>
        </linearGradient>

        <!-- Deep Red Color Palette -->
        <linearGradient id="deepRed" x1="0%" y1="50%" x2="100%" y2="50%">
            <stop offset="0%" stop-color="#881337"/>
            <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>

        <!-- Gold Gradient -->
        <linearGradient id="gold" x1="0%" y1="75%" x2="100%" y2="75%">
            <stop offset="0%" stop-color="#ca8a04"/>
            <stop offset="100%" stop-color="#eab308"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect fill="url(#gradient)" width="100%" height="600" />

    <!-- Saffron Gradient for Ganesha and Text -->
    <rect x="250" y="400" width="300" height="200" fill="url(#saffron)"/>

    <!-- Deep Red Gradient for Diya Glow -->
    <rect x="150" y="480" width="500" height="20" fill="url(#deepRed)"/>

    <!-- Ganesha Silhouette -->
    <circle cx="375" cy="300" r="60" fill="#f97316"/>
    <circle cx="400" cy="300" r="60" fill="#881337"/>

    <!-- Diya with Glow -->
    <rect x="200" y="500" width="600" height="200" fill="url(#gold)"/>
    <circle cx="250" cy="490" r="10" fill="#f97316"/>

    <!-- Text -->
    <text x="400" y="380" font-family="Serif" font-size="40">Pumsavanam</text>
</svg>
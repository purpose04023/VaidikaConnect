<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>

    <!-- Geometric Patterns -->
    <path d="M 400,250 L 800,250 A 400,400 0 1 1 400,600" stroke="#ca8a04" fill="none"/>
    <path d="M 400,300 L 800,300 A 400,400 0 1 1 400,500" stroke="#eab308" fill="none"/>

    <!-- Traditional Border -->
    <rect x="200" y="200" width="600" height="400" rx="20" ry="20" fill="#f97316"/>
    
    <!-- Corner Motifs -->
    <path d="M 80,50 L 120,50 A 40,40 0 1 1 80,90" stroke="#ca8a04" fill="none"/>
    <path d="M 80,350 L 120,350 A 40,40 0 1 1 80,310" stroke="#eab308" fill="none"/>

    <!-- Lord Ganesha Silhouette -->
    <circle cx="600" cy="300" r="70" fill="#ca8a04"/>
    
    <!-- Lamp with Soft Glow -->
    <path d="M 50,200 L 130,200 A 40,40 0 1 1 50,60" stroke="#eab308" fill="none"/>
    <circle cx="70" cy="200" r="10" fill="#f97316"/>
</svg>
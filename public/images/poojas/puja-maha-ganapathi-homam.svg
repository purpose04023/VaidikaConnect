<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect fill="#f97316" x="0" y="0" width="100%" height="100%"/>
    
    <!-- Geometric Patterns -->
    <path d="M 200,50 L 400,50 L 600,50 z" fill="#881337"/>
    <path d="M 200,50 L 400,50 L 600,50 z" fill="#ca8a04"/>
    
    <!-- Corner Motifs -->
    <rect x="0" y="0" width="100%" height="30" fill="#f97316"/>
    <rect x="600" y="0" width="100%" height="30" fill="#881337"/>
    
    <!-- Lord Ganesha Silhouette -->
    <circle cx="400" cy="300" r="50" fill="#ca8a04"/>
    
    <!-- Lamp with Soft Glow Effect -->
    <rect x="200" y="300" width="100%" height="60" fill="#f97316"/>
    <circle cx="200" cy="360" r="50" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="350" font-size="48" text-anchor="middle">Maha Ganapathi Homam</text>
</svg>
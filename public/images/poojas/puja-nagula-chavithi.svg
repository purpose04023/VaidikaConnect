<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Main Element - Serpent God Idol -->
    <ellipse cx="400" cy="250" rx="180" ry="180" fill="#ca8a04"/>
    <circle cx="400" cy="250" r="160" fill="#eab308"/>
    
    <!-- Geometric Patterns -->
    <path d="M 70,100 L 200,100 L 300,100 Z" fill="#ca8a04"/>
    <path d="M 50,150 L 150,150 L 250,150 Z" fill="#eab308"/>
    
    <!-- Corner Motifs -->
    <polygon points="70,60 130,60 130,140 70,140" fill="#ca8a04"/>
    <polygon points="250,60 310,60 310,140 250,140" fill="#eab308"/>
    
    <!-- Lord Ganesha Silhouette -->
    <circle cx="400" cy="270" r="100" fill="#ca8a04"/>
    <path d="M 400,250 L 420,260 L 380,270 Z" fill="#eab308"/>
    
    <!-- Lamp with Glow -->
    <circle cx="400" cy="310" r="50" fill="#ca8a04"/>
    <ellipse cx="400" cy="310" rx="20" ry="20" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="360" font-family="Serif" font-size="50">Worship of a serpent god idol</text>
</svg>
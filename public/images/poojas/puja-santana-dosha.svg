<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 400,50 L 420,80 L 440,50 Z" fill="#ca8a04"/>
    <path d="M 400,100 L 420,130 L 440,100 Z" fill="#eab308"/>
    
    <!-- Traditional Border -->
    <rect x="0" y="0" width="100%" height="100%" fill="url(#borderGradient)"/>
    
    <!-- Corner Motifs -->
    <path d="M 20,50 L 40,70 L 60,50 Z" fill="#881337"/>
    <path d="M 20,100 L 40,120 L 60,100 Z" fill="#881337"/>
    
    <!-- Lord Ganesha Silhouette -->
    <circle cx="400" cy="50" r="20" fill="#f97316"/>
    <path d="M 400,10 L 420,15 L 440,10 Z" fill="#881337"/>
    
    <!-- Diya with Glow -->
    <rect x="20" y="50" width="760" height="90" rx="10" ry="10" fill="#f97316"/>
    <circle cx="400" cy="55" r="8" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="250" font-family="Serif" font-size="24" text-anchor="middle">A newborn baby's feet, symbolizing the blessing of a child</text>
</svg>
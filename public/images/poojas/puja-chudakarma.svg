<svg viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    <rect x="0" y="0" width="800" height="600" fill="#881337"/>
    <rect x="0" y="0" width="800" height="600" fill="linear-gradient(#ca8a04, #eab308)"/>

    <!-- Geometric Patterns -->
    <path d="M 200 50 L 100 150 L 300 150 Z"/>
    <path d="M 600 50 L 700 150 L 800 150 Z"/>

    <!-- Traditional Border -->
    <rect x="20" y="20" width="740" height="560" fill="#f97316"/>
    <rect x="20" y="20" width="740" height="560" fill="#881337"/>

    <!-- Corner Motifs -->
    <path d="M 200 20 L 220 40 Z"/>
    <path d="M 200 50 L 220 70 Z"/>
    <path d="M 200 80 L 220 100 Z"/>

    <!-- Lord Ganesha Silhouette -->
    <rect x="40" y="30" width="160" height="160" fill="#ca8a04"/>
    <circle cx="80" cy="50" r="20" fill="#eab308"/>

    <!-- Lamp with Soft Glow -->
    <rect x="700" y="100" width="100" height="100" fill="#f97316"/>
    <circle cx="750" cy="120" r="40" fill="#eab308"/>

    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="48" text-anchor="middle">Chudakarma</text>
</svg>
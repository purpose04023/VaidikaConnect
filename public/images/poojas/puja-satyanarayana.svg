<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 400,200 L 500,200 A 100,100 0 1 1 500,300" fill="#881337"/>
    <path d="M 600,200 L 700,200 A 100,100 0 1 1 700,300" fill="#881337"/>
    
    <!-- Traditional Border -->
    <rect x="0" y="0" width="400" height="600" fill="#eab308"/>
    <rect x="400" y="0" width="400" height="200" fill="#eab308"/>
    
    <!-- Corner Motifs -->
    <path d="M 150,100 L 250,100 A 100,100 0 1 1 250,200" fill="#ca8a04"/>
    <path d="M 750,100 L 850,100 A 100,100 0 1 1 850,200" fill="#ca8a04"/>
    
    <!-- Lord Ganesha Silhouette -->
    <path d="M 300,300 L 400,300 A 100,100 0 1 1 400,400" fill="#ca8a04"/>
    
    <!-- Lamp with Soft Glow -->
    <circle cx="500" cy="290" r="60" fill="#f97316"/>
    <path d="M 500,300 L 500,360 A 80,80 0 1 1 480,380" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="320" font-size="72" text-anchor="middle">Satyanarayana Vratam</text>
    
    <!-- Diya (Lamp) with Soft Glow Effect -->
    <circle cx="500" cy="310" r="60" fill="#f97316"/>
    <path d="M 500,320 L 500,380 A 80,80 0 1 1 480,400" fill="#eab308"/>
</svg>
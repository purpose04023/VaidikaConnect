<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <defs>
        <!-- Palette -->
        <linearGradient id="palette">
            <stop offset="0%" stop-color="#f97316"/>
            <stop offset="100%" stop-color="#881337"/>
        </linearGradient>

        <linearGradient id="gold-gradient" gradientUnits="userSpaceOnUse" gradientTransform="rotate(45)">
            <stop offset="0%" stop-color="#ca8a04"/>
            <stop offset="100%" stop-color="#eab308"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect x="0" y="0" width="100%" height="600" fill="url(#palette)"/>

    <!-- Geometric Patterns -->
    <path d="M 200,450 L 300,475 L 400,450 Z" fill="#f97316"/>
    <path d="M 400,450 L 500,475 L 600,450 Z" fill="#881337"/>

    <!-- Corner Motifs -->
    <circle cx="200" cy="450" r="20" fill="#f97316"/>
    <circle cx="600" cy="450" r="20" fill="#881337"/>

    <!-- Lord Ganesha Silhouette -->
    <path d="M 100,400 L 200,425 L 300,400 Z" fill="#f97316"/>
    <path d="M 300,400 L 400,425 L 500,400 Z" fill="#881337"/>

    <!-- Lamp with Glow -->
    <circle cx="400" cy="450" r="50" fill="url(#gold-gradient)"/>
</svg>
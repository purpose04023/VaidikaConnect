<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" fill="#f97316" stroke="#f97316"/>
    <rect x="0" y="0" fill="#881337" stroke="#881337"/>
    <rect x="0" y="0" fill="#ca8a04" stroke="#ca8a04"/>
    <rect x="0" y="0" fill="#eab308" stroke="#eab308"/>

    <!-- Mandala Pattern -->
    <path d="M 150,200 L 700,200 L 700,600 L 150,600 Z"/>
    
    <!-- Traditional Border -->
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>

    <!-- Corner Motifs -->
    <path d="M 200,400 L 500,400 Z"/>
    <path d="M 400,200 L 800,200 Z"/>
    
    <!-- Lord Ganesha Silhouette -->
    <circle cx="600" cy="300" r="100" fill="#f97316"/>

    <!-- Lamp with Soft Glow Effect -->
    <rect x="450" y="350" width="200" height="200" rx="20" ry="20" fill="#eab308"/>
</svg>
<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 200,400 L 500,400 A 200,200 0 1 1 800,400 Z" stroke="#ca8a04" fill="none"/>
    <path d="M 600,300 L 700,300 A 200,200 0 1 1 700,500 Z" stroke="#eab308" fill="none"/>
    
    <!-- Traditional Border -->
    <rect x="0" y="0" width="800" height="600" rx="40" ry="40" fill="#f97316"/>
    
    <!-- Corner Motifs -->
    <path d="M 250,50 L 350,50 A 100,100 0 1 1 350,100 Z" stroke="#ca8a04" fill="none"/>
    <path d="M 650,50 L 750,50 A 100,100 0 1 1 750,100 Z" stroke="#eab308" fill="none"/>
    
    <!-- Lord Ganesha Silhouette -->
    <path d="M 400,200 L 600,200 A 200,200 0 1 1 800,200 Z" stroke="#ca8a04" fill="none"/>
    
    <!-- Lamp -->
    <path d="M 750,300 L 750,400 A 200,200 0 1 1 750,600 Z" stroke="#eab308" fill="none"/>
    <circle cx="750" cy="350" r="40" fill="#f97316"/>
    
    <!-- Text -->
    <text x="400" y="320" font-family="'Times New Roman', serif" font-size="24" text-anchor="middle">A pregnant woman being blessed during a baby shower like ceremony</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    <rect x="250" y="250" width="400" height="200" fill="#881337"/>
    <rect x="400" y="400" width="300" height="100" fill="#ca8a04"/>
    <rect x="600" y="500" width="200" height="50" fill="#eab308"/>

    <!-- Geometric Patterns -->
    <path d="M 100,100 L 700,100 L 400,200 L 600,200 Z"/>
    <path d="M 50,50 L 850,50 L 350,150 L 450,150 Z"/>

    <!-- Lord Ganesha -->
    <rect x="300" y="150" width="200" height="200" fill="#f97316"/>
    <circle cx="300" cy="180" r="40" fill="#eab308"/>

    <!-- Lamp -->
    <rect x="500" y="300" width="200" height="200" fill="#f97316"/>
    <circle cx="500" cy="330" r="40" fill="#eab308"/>

    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="24">Ancient vedic scriptures on palm leaves</text>
</svg>
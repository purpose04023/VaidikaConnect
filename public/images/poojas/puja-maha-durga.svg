<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Top Border -->
    <rect x="0" y="25" width="800" height="10" fill="#eab308"/>
    
    <!-- Middle Border -->
    <rect x="0" y="45" width="800" height="10" fill="#ca8a04"/>
    
    <!-- Bottom Border -->
    <rect x="0" y="60" width="800" height="10" fill="#eab308"/>
    
    <!-- Diya with Glow Effect -->
    <circle cx="250" cy="300" r="150" fill="#f97316" stroke="#f97316" stroke-width="4" transform="rotate(90 250,300)"/>
    
    <!-- Goddess Durga -->
    <circle cx="400" cy="300" r="80" fill="#ca8a04"/>
    
    <!-- Lord Ganesha -->
    <rect x="100" y="300" width="200" height="50" fill="#f97316"/>
    
    <!-- Text -->
    <text x="400" y="380" font-size="40" text-anchor="middle">A powerful idol of Goddess Durga</text>
    
    <!-- Traditional Border Patterns -->
    <rect x="200" y="50" width="600" height="10" fill="#ca8a04"/>
    <rect x="300" y="70" width="600" height="10" fill="#eab308"/>
</svg>
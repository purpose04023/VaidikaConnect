<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <circle cx="400" cy="250" r="180" fill="#ca8a04"/>
    <circle cx="400" cy="250" r="170" fill="#eab308"/>
    
    <!-- Text and Lamp -->
    <text x="400" y="360" font-family="Serif" font-size="48" text-anchor="middle">A student studying ancient texts, symbolizing intelligence</text>
    <circle cx="400" cy="250" r="150" fill="#eab308"/>
    
    <!-- Lord Ganesha -->
    <rect x="60" y="50" width="700" height="200" fill="#ca8a04"/>
</svg>
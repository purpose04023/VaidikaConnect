<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Top Border -->
    <rect x="0" y="0" width="800" height="20" fill="#eab308"/>
    
    <!-- Middle Border -->
    <rect x="0" y="40" width="800" height="160" fill="#ca8a04"/>
    
    <!-- Bottom Border -->
    <rect x="0" y="520" width="800" height="20" fill="#eab308"/>
    
    <!-- Elements -->
    <g>
        <!-- Mandala Pattern -->
        <path d="M 160,40 L 720,40 A 160,160 0 1 1 560,200" fill="#f97316"/>
        
        <!-- Traditional Border -->
        <rect x="80" y="40" width="720" height="160" fill="#ca8a04"/>
        
        <!-- Corner Motifs -->
        <path d="M 560,200 L 560,320 A 40,40 0 1 1 560,360" fill="#eab308"/>
        <path d="M 560,360 L 560,480 A 40,40 0 1 1 560,520" fill="#ca8a04"/>
        
        <!-- Diya with Soft Glow -->
        <circle cx="560" cy="400" r="70" fill="#eab308"/>
        <path d="M 560,400 L 560,420 A 10,10 0 1 1 560,440" fill="#f97316"/>
    </g>
    
    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="24">Sastipurti</text>
</svg>
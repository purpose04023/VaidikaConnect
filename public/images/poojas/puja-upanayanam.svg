<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" fill="#ca8a04" stroke="#eab308"/>
    <rect x="250" y="250" fill="#f97316" stroke="#881337"/>
    <rect x="400" y="400" fill="#f97316" stroke="#881337"/>

    <!-- Mandala Pattern -->
    <polygon points="250,250 300,200 350,250 400,300 450,250 500,200 550,250" fill="#ca8a04"/>
    <polygon points="150,150 200,100 250,150 300,200 350,150 400,100 450,150" fill="#ca8a04"/>

    <!-- Corner Motifs -->
    <rect x="0" y="0" width="20" height="60"/>
    <rect x="780" y="0" width="20" height="60"/>
    <rect x="0" y="590" width="20" height="20"/>
    <rect x="780" y="590" width="20" height="20"/>

    <!-- Lord Ganesha Silhouette -->
    <path d="M 300,400 L 350,450 L 400,400 Z"/>
    
    <!-- Lamp with Soft Glow -->
    <circle cx="400" cy="280" r="100" fill="#f97316"/>
    <ellipse cx="400" cy="280" rx="50" ry="30" fill="#eab308"/>
</svg>
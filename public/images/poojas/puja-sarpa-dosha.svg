<svg viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" fill="#f97316" stroke="#ca8a04"/>
    <rect x="250" y="250" fill="#eab308" opacity=".5"/>

    <!-- Geometric Patterns -->
    <path d="M 100,100 L 700,100 L 700,600 L 100,600 Z"/>
    <path d="M 200,200 L 500,200 L 500,400 L 200,400 Z"/>

    <!-- Traditional Border -->
    <rect x="10" y="10" width="780" height="580" fill="#881337"/>
    <rect x="90" y="90" width="690" height="490" fill="#ca8a04"/>

    <!-- Corner Motifs -->
    <path d="M 20,20 L 50,50 L 50,100 Z"/>
    <path d="M 70,70 L 60,60 L 60,90 Z"/>

    <!-- Lord Ganesha Silhouette -->
    <circle cx="400" cy="300" r="20" fill="#ca8a04"/>
    <path d="M 350,350 L 450,350 L 450,450 Z"/>

    <!-- Lamp with Soft Glow -->
    <circle cx="600" cy="300" r="20" fill="#eab308"/>
    <path d="M 550,550 L 650,550 L 650,450 Z"/>

    <!-- Text -->
    <text x="400" y="350" font-family="Serif" fill="#f97316">A stone carving of a serpent god for Sarpa Dosha Puja</text>
</svg>
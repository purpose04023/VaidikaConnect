<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Palette Gradient -->
    <linearGradient id="gradient">
        <stop offset="0%" stop-color="#881337"/>
        <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    
    <!-- Geometric Patterns -->
    <rect x="25" y="25" width="650" height="400" fill="url(#gradient)"/>
    
    <!-- Lord Ganesha Silhouette -->
    <circle cx="190" cy="300" r="80" fill="#ca8a04"/>
    <circle cx="270" cy="300" r="80" fill="#eab308"/>
    
    <!-- Diya with Glow Effect -->
    <rect x="150" y="350" width="600" height="200" fill="url(#gradient)"/>
    <circle cx="170" cy="370" r="40" fill="#f97316"/>
    
    <!-- Text "Vedarambham" -->
    <text x="400" y="500" font-family="Serif" font-size="24">VEDARAMBHAM</text>
</svg>
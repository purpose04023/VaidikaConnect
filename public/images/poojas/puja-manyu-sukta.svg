<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Gradient for warmth -->
    <linearGradient id="warm-gradient">
        <stop offset="0%" stop-color="#881337"/>
        <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    
    <!-- Geometric patterns -->
    <rect x="25" y="25" width="650" height="400" fill="url(#warm-gradient)"/>
    
    <!-- Traditional border -->
    <rect x="150" y="150" width="600" height="300" fill="#f97316"/>
    
    <!-- Corner motifs -->
    <polygon points="40,20 80,20 80,40 40,40" fill="#eab308"/>
    <polygon points="50,150 150,150 150,250 50,250" fill="#f97316"/>
    
    <!-- Lord Ganesha silhouette -->
    <rect x="400" y="200" width="100" height="100" fill="#ca8a04"/>
    <circle cx="400" cy="250" r="30" fill="#eab308"/>
    
    <!-- Lamp with soft glow -->
    <rect x="600" y="300" width="100" height="100" fill="#f97316"/>
    <circle cx="600" cy="350" r="40" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="250" font-family="Serif" font-size="24">A priest performing a yagna (homa)</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    <rect x="250" y="400" width="300" height="200" fill="#ca8a04"/>
    <rect x="500" y="400" width="300" height="200" fill="#eab308"/>

    <!-- Geometric Patterns -->
    <path d="M 100, 60 L 700, 60 L 700, 540 L 100, 540 Z"/>
    <path d="M 200, 300 L 600, 300 L 600, 280 L 200, 280 Z"/>

    <!-- Lord Ganesha -->
    <rect x="150" y="450" width="150" height="150" fill="#881337"/>
    <circle cx="160" cy="460" r="20" fill="#ca8a04"/>

    <!-- Lord Shiva -->
    <rect x="400" y="300" width="100" height="100" fill="#f97316"/>
    <circle cx="450" cy="320" r="20" fill="#881337"/>

    <!-- Lamp -->
    <rect x="600" y="400" width="100" height="100" fill="#eab308"/>
    <circle cx="650" cy="420" r="20" fill="#ca8a04"/>

    <!-- Text -->
    <text x="400" y="300" font-size="72">A depiction of Lord Shiva in meditation</text>
</svg>
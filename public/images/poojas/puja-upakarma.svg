<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Elements -->
    <rect x="50" y="40" width="700" height="200" rx="30" ry="30" fill="#881337"/>
    <circle cx="400" cy="300" r="150" fill="#ca8a04"/>
    <circle cx="400" cy="300" r="120" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="360" font-size="72" text-anchor="middle">Upaakarma</text>
    
    <!-- Lamp with glow effect -->
    <rect x="50" y="190" width="700" height="180" rx="30" ry="30" fill="#f97316"/>
    <circle cx="400" cy="120" r="150" fill="#ca8a04"/>
    <circle cx="400" cy="120" r="120" fill="#eab308"/>
    
    <!-- Traditional border and corner motifs -->
    <path d="M 70,60 L 70,150 A 70,70 0 0,1 140,150 A 70,70 0 0,1 140,60 Z" fill="#881337"/>
    <path d="M 20,60 L 20,150 A 20,20 0 0,1 40,150 A 20,20 0 0,1 40,60 Z" fill="#881337"/>
    <path d="M 50,60 L 50,150 A 50,50 0 0,1 100,150 A 50,50 0 0,1 100,60 Z" fill="#881337"/>
    <path d="M 40,20 L 40,60 A 40,40 0 0,1 80,60 A 40,40 0 0,1 80,20 Z" fill="#881337"/>
    <path d="M 50,20 L 50,60 A 50,50 0 0,1 100,60 A 50,50 0 0,1 100,20 Z" fill="#881337"/>
    <path d="M 40,50 L 40,90 A 40,40 0 0,1 80,90 A 40,40 0 0,1 80,50 Z" fill="#881337"/>
    <path d="M 50,50 L 50,90 A 50,50 0 0,1 100,90 A 50,50 0 0,1 100,50 Z" fill="#881337"/>
</svg>
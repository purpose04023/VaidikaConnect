<svg viewBox="0 0 800 600" width="100%" height="100%">
    <defs>
        <!-- Define the gradient for the background -->
        <linearGradient id="gradient">
            <stop offset="0%" stop-color="#ca8a04"/>
            <stop offset="100%" stop-color="#eab308"/>
        </linearGradient>
    </defs>
    
    <!-- Background pattern with gradient -->
    <rect x="0" y="0" width="800" height="600" fill="url(#gradient)"/>

    <!-- Main element: Shiva Linga and Kedareshwara Vratam text -->
    <g transform="translate(400 300)">
        <rect x="-20" y="-15" width="800" height="600" fill="#f97316"/>
        <rect x="-20" y="-15" width="800" height="600" fill="#881337"/>
        
        <!-- Shiva Linga -->
        <circle cx="400" cy="300" r="150" fill="#eab308"/>
        
        <!-- Kedareshwara Vratam text -->
        <text x="420" y="360" font-family="Serif" font-size="72" fill="#f97316">Kedareshwara Vratam with Shiva Linga</text>
    </g>

    <!-- Lamp symbol -->
    <rect x="-50" y="-40" width="80" height="80" fill="#eab308"/>
    <circle cx="70" cy="60" r="10" fill="#f97316"/>

</svg>
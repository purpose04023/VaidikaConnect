<svg viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    <rect x="250" y="250" width="200" height="400" fill="#ca8a04"/>
    <rect x="400" y="400" width="200" height="200" fill="#eab308"/>
    
    <!-- Geometric Patterns -->
    <path d="M 150,600 L 750,600 L 750,0 L 150,0 Z" fill="#f97316"/>
    <path d="M 200,400 L 600,400 L 600,0 L 200,0 Z" fill="#ca8a04"/>
    <path d="M 350,200 L 700,200 L 700,0 L 350,0 Z" fill="#eab308"/>
    
    <!-- Lord Ganesha -->
    <circle cx="160" cy="400" r="50" fill="#f97316"/>
    <path d="M 210,350 L 650,350 L 650,0 L 210,0 Z" fill="#ca8a04"/>
    
    <!-- Lamp -->
    <circle cx="400" cy="300" r="70" fill="#f97316"/>
    <path d="M 450,250 L 550,250 L 550,0 L 450,0 Z" fill="#ca8a04"/>
    
    <!-- Text -->
    <text x="400" y="360" font-family="Serif" font-size="120">Sama Vartamu</text>
    
    <!-- Soft Glow Effect -->
    <circle cx="500" cy="380" r="70" fill="#f97316"/>
    <circle cx="430" cy="380" r="70" fill="#ca8a04"/>
</svg>
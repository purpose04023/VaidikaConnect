<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Palette Gradient -->
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#881337"/>
        <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    
    <!-- Elements -->
    <rect x="50" y="40" width="600" height="200" fill="url(#gradient)"/>
    <circle cx="400" cy="170" r="50" fill="#ca8a04"/>
    <circle cx="400" cy="170" r="30" fill="#eab308"/>
    
    <!-- Lord Ganesha -->
    <rect x="200" y="300" width="150" height="150" fill="#f97316"/>
    <circle cx="225" cy="325" r="10" fill="#881337"/>
    
    <!-- Diya -->
    <rect x="400" y="500" width="100" height="100" fill="#f97316"/>
    <circle cx="425" cy="525" r="8" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="550" font-family="Serif" font-size="48" text-anchor="middle">Karna Vedha</text>
</svg>
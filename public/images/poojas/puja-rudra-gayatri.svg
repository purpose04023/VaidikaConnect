<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <defs>
        <!-- Gradient -->
        <linearGradient id="gradient">
            <stop offset="0%" stop-color="#ca8a04"/>
            <stop offset="100%" stop-color="#eab308"/>
        </linearGradient>

        <!-- Mandala Pattern -->
        <pattern id="mandala-pattern" patternUnits="userSpaceOnUse" width="256" height="256">
            <circle cx="128" cy="128" r="128" fill="#f97316"/>
            <circle cx="128" cy="128" r="104" fill="#ca8a04"/>
        </pattern>

        <!-- Traditional Border -->
        <rect x="0" y="0" width="800" height="600" fill="url(#gradient)" stroke-width="5"/>

        <!-- Corner Motifs -->
        <path d="M 128,376 L 400,376 M 400,376 L 600,376"/>
    </defs>

    <!-- Protective Fire Ritual -->
    <rect x="50" y="50" width="700" height="500" fill="#881337"/>

    <!-- Lord Ganesha Silhouette -->
    <path d="M 200,400 L 600,400 M 600,400 L 400,400"/>
    <circle cx="500" cy="400" r="100" fill="#f97316"/>

    <!-- Lamp with Soft Glow -->
    <rect x="200" y="380" width="300" height="100" fill="#eab308"/>
</svg>
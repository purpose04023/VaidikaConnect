<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Palette Gradient -->
    <linearGradient id="gradient">
        <stop offset="0%" stop-color="#881337"/>
        <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    
    <!-- Geometric Patterns -->
    <rect x="20" y="40" width="660" height="520" fill="url(#gradient)"/>
    
    <!-- Lord Ganesha Silhouette -->
    <circle cx="190" cy="300" r="80" fill="#ca8a04"/>
    <circle cx="190" cy="300" r="75" fill="#eab308"/>
    
    <!-- Lamp with Soft Glow -->
    <rect x="200" y="400" width="600" height="100" fill="#f97316"/>
    <circle cx="200" cy="500" r="50" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="48" text-anchor="middle">Sanyasam</text>
</svg>
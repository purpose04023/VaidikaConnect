<svg viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    <rect x="200" y="450" width="200" height="150" fill="#ca8a04"/>
    <rect x="600" y="450" width="200" height="150" fill="#eab308"/>

    <!-- Geometric Patterns -->
    <path d="M 100,200 L 700,200 L 700,400 L 100,400 Z"/>
    <path d="M 250,200 L 650,200 L 650,400 L 250,400 Z"/>

    <!-- Traditional Border -->
    <rect x="0" y="0" width="800" height="100" fill="#881337"/>
    <rect x="0" y="500" width="800" height="100" fill="#881337"/>

    <!-- Corner Motifs -->
    <path d="M 200,400 L 600,400 Z"/>
    <path d="M 400,450 L 400,550 Z"/>

    <!-- Lord Ganesha Silhouette -->
    <ellipse cx="300" cy="300" rx="100" ry="100" fill="#ca8a04"/>
    <circle cx="300" cy="300" r="50" fill="#eab308"/>

    <!-- Diya with Soft Glow -->
    <path d="M 60,20 L 70,10 L 70,90 L 60,80 Z"/>
    <circle cx="70" cy="45" r="10" fill="#f97316"/>
</svg>
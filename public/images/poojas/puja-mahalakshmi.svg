<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect fill="#f97316" x="0" y="0" width="100%" height="100%"/>
    
    <!-- Geometric Patterns -->
    <path d="M 200,50 L 400,100 L 600,50 Z" fill="#881337"/>
    <path d="M 200,50 L 400,100 L 600,50 Z" fill="#ca8a04"/>
    
    <!-- Corner Motifs -->
    <rect x="100" y="100" width="300" height="300" rx="20" ry="20"/>
    <rect x="600" y="50" width="300" height="300" rx="20" ry="20"/>
    
    <!-- Goddess Mahalakshmi Silhouette -->
    <path d="M 400,100 L 500,100 L 600,100 Z" fill="#f97316"/>
    
    <!-- Lord Ganesha or Symbolic Representation -->
    <circle cx="200" cy="100" r="40" fill="#881337"/>
    
    <!-- Lamp with Soft Glow Effect -->
    <rect x="50" y="50" width="150" height="150" rx="20" ry="20" fill="#eab308"/>
    <circle cx="65" cy="65" r="10" fill="#f97316"/>
    
    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="24">Goddess Mahalakshmi depiction</text>
</svg>
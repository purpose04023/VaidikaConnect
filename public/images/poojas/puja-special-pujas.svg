<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 200,400 L 800,400 M 200,500 L 800,500" stroke="#ca8a04" fill="none" stroke-width="10"/>
    
    <!-- Traditional Border -->
    <rect x="0" y="0" width="800" height="600" fill="#881337"/>
    
    <!-- Corner Motifs -->
    <path d="M 20,400 L 50,400 M 20,500 L 50,500" stroke="#ca8a04" fill="none" stroke-width="10"/>
    
    <!-- Lord Ganesha Silhouette -->
    <path d="M 300,400 L 600,400 M 300,500 L 600,500" fill="#eab308"/>
    
    <!-- Diya (Lamp) with Soft Glow Effect -->
    <circle cx="400" cy="250" r="100" fill="#f97316" stroke="#ca8a04" stroke-width="5" transform="rotate(45 400,250)" />
    
    <!-- Text "Special Pujas" -->
    <text x="400" y="350" font-family="Serif" font-size="60" fill="#f97316">Special Pujas</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
    <rect x="150" y="150" width="400" height="400" fill="#f97316"/>
    <rect x="250" y="250" width="400" height="400" fill="#881337"/>
    <rect x="350" y="350" width="400" height="400" fill="#ca8a04"/>
    <rect x="450" y="450" width="400" height="400" fill="#eab308"/>

    <!-- Geometric Patterns -->
    <path d="M 150,200 L 300,200 L 450,200 Z"/>
    <path d="M 150,300 L 300,300 L 450,300 Z"/>

    <!-- Traditional Border -->
    <rect x="150" y="150" width="700" height="600" fill="#881337"/>
    <rect x="250" y="250" width="700" height="600" fill="#ca8a04"/>

    <!-- Corner Motifs -->
    <path d="M 150,150 L 250,150 Z"/>
    <path d="M 350,150 L 450,150 Z"/>
    <path d="M 150,250 L 250,250 Z"/>
    <path d="M 350,250 L 450,250 Z"/>

    <!-- Diya with Soft Glow -->
    <circle cx="600" cy="280" r="100" fill="#f97316"/>
    <filter id="soft-glow">
        <feGaussianBlur stdDeviation="5"/>
        <feColorMatrix type="matrix"
            values="
                0.3333 0 0 0 0
                0 0.3333 0 0 0
                0 0 0.3333 0 0
                0 0 0 1 0"
        />
    </filter>
    <circle cx="600" cy="280" r="100" fill="#f97316" filter="url(#soft-glow)"/>
</svg>
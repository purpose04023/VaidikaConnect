<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Top Border -->
    <rect x="0" y="25" width="800" height="2" fill="#eab308"/>
    
    <!-- Middle Border -->
    <rect x="0" y="50" width="800" height="1" fill="#ca8a04"/>
    
    <!-- Bottom Border -->
    <rect x="0" y="75" width="800" height="2" fill="#eab308"/>
    
    <!-- Left and Right Borders -->
    <rect x="0" y="0" width="1" height="600" fill="#ca8a04"/>
    <rect x="800" y="0" width="1" height="600" fill="#eab308"/>
    
    <!-- Geometric Patterns -->
    <polygon points="250,10 750,10 750,90 250,90" fill="#f97316"/>
    <polygon points="450,10 750,10 750,80 450,80" fill="#ca8a04"/>
    
    <!-- Lord Ganesha Silhouette -->
    <rect x="200" y="300" width="160" height="160" rx="40" ry="40" fill="#eab308"/>
    <circle cx="200" cy="300" r="150" fill="#f97316"/>
    
    <!-- Lamp -->
    <rect x="300" y="350" width="100" height="100" rx="40" ry="40" fill="#ca8a04"/>
    <circle cx="300" cy="350" r="90" fill="#f97316"/>
    
    <!-- Text -->
    <text x="400" y="320" font-family="Serif" font-size="48" text-anchor="middle">A happy Indian couple together</text>
</svg>
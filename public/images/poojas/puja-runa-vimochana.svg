<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 200,50 L 400,100 L 600,50 Z" fill="#ca8a04"/>
    <path d="M 200,50 L 400,100 L 600,50 Z" fill="#eab308"/>
    
    <!-- Traditional Border -->
    <rect x="0" y="0" width="800" height="600" fill="url(#borderGradient)"/>
    
    <!-- Corner Motifs -->
    <circle cx="100" cy="50" r="20" fill="#ca8a04"/>
    <circle cx="700" cy="50" r="20" fill="#eab308"/>
    
    <!-- Lord Ganesha Silhouette -->
    <path d="M 150,30 L 250,60 L 350,30 Z" fill="url(#ganeshaGradient)"/>
    
    <!-- Lamp with Soft Glow -->
    <circle cx="400" cy="300" r="50" fill="#f97316"/>
    <path d="M 420,300 L 480,320 Z" fill="url(#softGlow)"/>
    
    <!-- Text -->
    <text x="400" y="350" font-family="Serif" font-size="16">Person praying with folded hands for relief</text>
</svg>
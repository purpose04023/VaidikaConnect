<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    <rect x="0" y="0" width="800" height="600" fill="#881337"/>
    <rect x="0" y="0" width="800" height="600" fill="linear-gradient(#ca8a04, #eab308)"/>

    <!-- Geometric Patterns -->
    <path d="M 250 300 L 100 400 A 700 700 0 1 1 600 300 Z" fill="#f97316"/>
    <path d="M 600 300 L 750 200 A 700 700 0 1 1 800 300 Z" fill="#ca8a04"/>

    <!-- Bride and Groom -->
    <rect x="200" y="200" width="200" height="200" rx="50" ry="50" fill="#f97316"/>
    <rect x="600" y="400" width="200" height="200" rx="50" ry="50" fill="#ca8a04"/>

    <!-- Lord Ganesha -->
    <path d="M 400 300 L 500 100 A 700 700 0 1 1 600 200 Z" fill="#f97316"/>
    <circle cx="450" cy="250" r="50" fill="#881337"/>

    <!-- Diya -->
    <rect x="450" y="250" width="100" height="100" rx="5" ry="5" fill="#f97316"/>
    <circle cx="460" cy="260" r="5" fill="#881337"/>

    <!-- Text -->
    <text x="400" y="400" font-family="Arial, sans-serif">An Indian bride and groom during their wedding</text>
</svg>
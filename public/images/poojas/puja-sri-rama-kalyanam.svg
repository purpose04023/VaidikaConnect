<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Top Border -->
    <rect x="0" y="25" width="800" height="4" fill="#eab308"/>
    
    <!-- Middle Border -->
    <rect x="0" y="50" width="800" height="1" fill="#ca8a04"/>
    
    <!-- Bottom Border -->
    <rect x="0" y="75" width="800" height="3" fill="#eab308"/>
    
    <!-- Left Border -->
    <rect x="25" y="0" width="1" height="600" fill="#ca8a04"/>
    
    <!-- Right Border -->
    <rect x="775" y="0" width="1" height="600" fill="#eab308"/>
    
    <!-- Diya with Glow Effect -->
    <circle cx="400" cy="290" r="100" fill="#f97316" stroke="#ca8a04" stroke-width="5" transform="translate(400, 290) rotate(-15)">
        <animateTransform attributeName="transform" type="rotate" values="-15 400 290" dur="1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Text "Sri Rama Kalyanam" -->
    <text x="400" y="320" font-family="Arial, sans-serif" fill="#f97316" text-anchor="middle">Sri Rama Kalyanam</text>
    
    <!-- Ganesha Silhouette -->
    <path d="M 50 100 L 850 100 M 200 140 L 50 170 L 850 170" fill="#ca8a04"/>
    
</svg>
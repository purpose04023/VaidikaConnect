<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect fill="#f97316" x="0" y="0" width="100%" height="100%"/>
    
    <!-- Geometric Patterns -->
    <path d="M 200,50 L 400,50 L 400,150 L 200,150 Z" fill="#ca8a04"/>
    <path d="M 300,50 L 500,50 L 500,150 L 300,150 Z" fill="#eab308"/>
    
    <!-- Traditional Border -->
    <rect x="200" y="40" width="600" height="50" fill="#f97316"/>
    <rect x="200" y="150" width="600" height="50" fill="#eab308"/>
    
    <!-- Corner Motifs -->
    <path d="M 40,50 L 40,150 Z" fill="#f97316"/>
    <path d="M 260,50 L 260,150 Z" fill="#eab308"/>
    
    <!-- Lord Ganesha Silhouette -->
    <rect x="300" y="40" width="100" height="100" fill="#ca8a04"/>
    <circle cx="300" cy="50" r="20" fill="#eab308"/>
    
    <!-- Bhavani Deeksha Lamp -->
    <rect x="600,50" width="200" height="100" fill="#f97316"/>
    <circle cx="600" cy="60" r="40" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="350" font-family="Serif" font-size="24" text-anchor="middle">Bhavani Deeksha</text>
</svg>
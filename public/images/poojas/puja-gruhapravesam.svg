<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    
    <!-- Palette Gradient -->
    <linearGradient id="gradient">
        <stop offset="0%" stop-color="#ca8a04"/>
        <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    
    <!-- Elements -->
    <rect x="20" y="20" width="760" height="560" fill="url(#gradient)"/>
    <circle cx="400" cy="300" r="100" fill="#881337"/>
    
    <!-- Lord Ganesha -->
    <rect x="200" y="200" width="160" height="160" fill="#ca8a04"/>
    <circle cx="200" cy="200" r="100" fill="#eab308"/>
    
    <!-- Diya (Lamp) -->
    <rect x="500" y="300" width="100" height="100" fill="#f97316"/>
    <circle cx="500" cy="300" r="40" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="320" font-family="Serif" font-size="48">Gruhapravesam</text>
    
</svg>
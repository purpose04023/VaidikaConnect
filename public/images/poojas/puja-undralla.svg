<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <rect x="250" y="200" width="150" height="150" rx="40" ry="40" fill="#881337"/>
    <rect x="350" y="350" width="100" height="100" rx="40" ry="40" fill="#ca8a04"/>
    
    <!-- Traditional Border -->
    <path d="M 200,600 L 600,600 M 600,300 L 600,150 L 200,150" fill="#f97316"/>
    
    <!-- Corner Motifs -->
    <path d="M 400,600 L 800,600 M 800,300 L 800,150 L 400,150" fill="#f97316"/>
    
    <!-- Lord Ganesha Silhouette -->
    <path d="M 200,500 C 200,500 300,500 300,500 L 400,500" fill="#ca8a04"/>
    
    <!-- Lamp with Glow Effect -->
    <rect x="600" y="150" width="200" height="200" rx="40" ry="40" fill="#eab308"/>
    <circle cx="600" cy="175" r="20" fill="#f97316"/>
    
    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="24">Indian sweet balls (Undrallu/Modak)</text>
</svg>
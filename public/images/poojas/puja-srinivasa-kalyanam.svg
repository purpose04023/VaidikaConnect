<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>

    <!-- Palette Gradient -->
    <linearGradient id="gradient">
        <stop offset="0%" stop-color="#881337"/>
        <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>

    <!-- Elements -->
    <rect x="25" y="40" width="650" height="50" fill="#ca8a04"/>
    <rect x="25" y="90" width="650" height="50" fill="#eab308"/>

    <!-- Mandala -->
    <path d="M 10,10 L 70,70 L 100,100 L 140,70 L 170,100 Z" fill="#f97316"/>
    <rect x="25" y="180" width="650" height="40" fill="#ca8a04"/>

    <!-- Corner Motifs -->
    <path d="M 10,10 L 70,70 Z" fill="#f97316"/>
    <rect x="25" y="220" width="650" height="40" fill="#ca8a04"/>

    <!-- Lord Ganesha -->
    <path d="M 10,10 L 70,70 Z" fill="#f97316"/>
    <rect x="25" y="260" width="650" height="40" fill="#ca8a04"/>

    <!-- Lamp -->
    <circle cx="350" cy="300" r="50" fill="#eab308"/>
    <path d="M 350,290 L 360,310 Z" fill="#f97316"/>

    <!-- Text -->
    <text x="400" y="350" font-family="Serif">Srinivasa Kalyanam</text>
</svg>
<svg viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" fill="#f97316" stroke="#f97316"/>
    <rect x="200" y="400" fill="#881337" stroke="#881337"/>

    <!-- Mandala Pattern -->
    <path d="M 50,50 L 50,150 A 100,100 0 1,0 200,150 L 200,50 Z" fill="#ca8a04"/>
    <path d="M 300,50 L 300,150 A 100,100 0 1,0 400,150 L 400,50 Z" fill="#eab308"/>

    <!-- Corner Motifs -->
    <path d="M 600,200 L 600,280 A 100,100 0 1,0 700,280 L 700,200 Z" fill="#f97316"/>
    <path d="M 400,200 L 400,280 A 100,100 0 1,0 500,280 L 500,200 Z" fill="#f97316"/>

    <!-- Lord Ganesha Silhouette -->
    <path d="M 400,400 L 400,500 A 100,100 0 1,0 500,500 L 500,400 Z" fill="#f97316"/>
    <path d="M 200,400 L 200,500 A 100,100 0 1,0 300,500 L 300,400 Z" fill="#f97316"/>

    <!-- Diya with Glow -->
    <path d="M 50,200 L 50,280 A 100,100 0 1,0 150,280 L 150,200 Z" fill="#eab308"/>
    <circle cx="50" cy="240" r="20" fill-opacity=".5"/>

</svg>
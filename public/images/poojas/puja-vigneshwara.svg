<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 200 50 L 400 150 L 600 50 Z" stroke="#881337" stroke-width="20" fill="none"/>
    <rect x="200" y="50" width="200" height="100" rx="20" ry="20" fill="#ca8a04"/>
    
    <!-- Diya with Glow -->
    <circle cx="300" cy="200" r="60" fill="#eab308" stroke="#f97316" stroke-width="5"/>
    <ellipse cx="300" cy="200" rx="40" ry="40" fill="none"/>
    
    <!-- Lord Ganesha Silhouette -->
    <path d="M 400 300 L 480 360 L 560 300 Z" stroke="#ca8a04" stroke-width="20" fill="none"/>
    <circle cx="480" cy="360" r="10" fill="#f97316"/>
    
    <!-- Flowers -->
    <path d="M 500 200 L 520 220 L 540 200 Z" stroke="#ca8a04" stroke-width="10" fill="none"/>
    <circle cx="520" cy="220" r="10" fill="#f97316"/>
    
    <!-- Text -->
    <text x="400" y="300" font-size="48" font-family="Serif">Ganesha idol decorated with flowers</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
    <rect x="10" y="10" width="780" height="580" fill="#f97316"/>
    <rect x="20" y="20" width="740" height="540" fill="#881337"/>
    <rect x="30" y="30" width="700" height="500" fill="#ca8a04"/>

    <!-- Geometric Patterns -->
    <path d="M 200,300 L 600,300 A 100,100 0 1 1 400,400"/>
    <path d="M 500,200 L 700,200 A 100,100 0 1 1 600,300"/>

    <!-- Lord Ganesha Silhouette -->
    <rect x="40" y="40" width="80" height="80" fill="#eab308"/>
    <circle cx="50" cy="50" r="20" fill="#f97316"/>

    <!-- Lamp with Glow Effect -->
    <rect x="50" y="40" width="70" height="70" fill="#eab308"/>
    <circle cx="60" cy="60" r="20" fill="#f97316"/>

    <!-- Text "A priest reading from a sacred text during a homa" -->
    <text x="400" y="350" font-family="Serif" font-size="24">A priest reading from a sacred text during a homa</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 400,250 L 400,500 A 800,800 0 1 1 0,500" stroke="#ca8a04" fill="none" />
    
    <!-- Kalash -->
    <rect x="300" y="300" width="200" height="200" rx="50" ry="50" fill="#881337"/>
    
    <!-- Lotus Flower -->
    <path d="M 400,300 L 600,300 A 200,200 0 1 1 400,500" stroke="#ca8a04" fill="none"/>
    
    <!-- Lamp with Glow -->
    <rect x="400" y="400" width="200" height="200" rx="50" ry="50" fill="#eab308" stroke="#f97316" stroke-width="10"/>
    
    <!-- Text -->
    <text x="400" y="450" font-family="Serif" font-size="24" text-anchor="middle">Lotus flower and kalash, symbols of Goddess Lakshmi</text>
    
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Top Border -->
    <rect x="0" y="25" width="800" height="2" fill="#ca8a04"/>
    
    <!-- Middle Borders -->
    <rect x="0" y="50" width="800" height="1" fill="#eab308"/>
    <rect x="0" y="75" width="800" height="1" fill="#ca8a04"/>
    
    <!-- Bottom Border -->
    <rect x="0" y="95" width="800" height="2" fill="#eab308"/>
    
    <!-- Geometric Patterns -->
    <path d="M 400,60 L 400,120 L 400,180 Z" fill="#ca8a04"/>
    <path d="M 500,60 L 500,120 L 500,180 Z" fill="#eab308"/>
    
    <!-- Lord Ganesha Silhouette -->
    <rect x="400" y="90" width="100" height="100" rx="50" ry="50" fill="#ca8a04"/>
    <path d="M 390,70 L 420,70 Z" fill="#eab308"/>
    
    <!-- Ananta Padmanabha Swamy -->
    <rect x="100" y="50" width="600" height="600" rx="50" ry="50" fill="#ca8a04"/>
    <path d="M 200,30 L 250,30 Z" fill="#eab308"/>
    
    <!-- Sheshanaga -->
    <rect x="100" y="600" width="600" height="600" rx="50" ry="50" fill="#ca8a04"/>
    <path d="M 200,50 L 250,50 Z" fill="#eab308"/>
    
    <!-- Lamp -->
    <rect x="100" y="600" width="600" height="200" rx="50" ry="50" fill="#ca8a04"/>
    <path d="M 200,70 L 250,70 Z" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="60">Ananta Padmanabha Swamy reclining on Sheshanaga</text>
</svg>
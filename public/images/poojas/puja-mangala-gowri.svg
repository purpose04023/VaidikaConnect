<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>

    <!-- Palette Gradient -->
    <linearGradient id="gradient" x2="100%">
        <stop offset="0%" stop-color="#881337"/>
        <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>

    <!-- Main Icon - Goddess Gowri (Parvati) -->
    <rect x="200" y="50" width="400" height="60" fill="url(#gradient)" transform="rotate(90 200 50)" />

    <!-- Decorative Elements -->
    <path d="M180,30 L220,70 L260,30 Z" fill="#ca8a04"/>
    <path d="M180,110 L220,150 L260,110 Z" fill="#eab308"/>

    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="72" text-anchor="middle">Goddess Gowri (Parvati) idol</text>

    <!-- Lamp with Glow Effect -->
    <rect x="500" y="180" width="200" height="30" fill="#f97316"/>
    <circle cx="500" cy="180" r="15" fill-opacity="0.5" filter="url(#glowFilter)" />
</svg>
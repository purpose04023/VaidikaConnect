<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 200,50 L 400,50 A 200,200 0 1 1 600,50" stroke="#881337" fill="none"/>
    <path d="M 400,50 L 600,50 A 200,200 0 1 1 800,50" stroke="#881337" fill="none"/>
    
    <!-- Corner Motifs -->
    <rect x="0" y="0" width="40" height="600" rx="10" ry="20" fill="#ca8a04"/>
    <rect x="760" y="0" width="40" height="600" rx="10" ry="20" fill="#ca8a04"/>
    
    <!-- Lord Ganesha -->
    <path d="M 350,300 L 450,300 A 100,100 0 1 1 550,300" stroke="#eab308" fill="none"/>
    
    <!-- Lamp with Glow -->
    <circle cx="600" cy="290" r="40" fill="#f97316"/>
    <path d="M 600,290 L 600,330 A 50,50 0 1 1 600,380" stroke="#eab308" fill="none"/>
    
    <!-- Text -->
    <text x="400" y="350" font-family="Serif" font-size="24">Gowri Nomu</text>
</svg>
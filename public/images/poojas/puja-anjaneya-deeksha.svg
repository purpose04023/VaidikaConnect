<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect fill="#f97316" x="0" y="0" width="100%" height="100%"/>
    
    <!-- Geometric Patterns -->
    <path d="M 250,400 L 800,400 L 800,0 L 250,0 Z" fill="#ca8a04"/>
    <path d="M 150,360 L 750,360 L 750,0 L 150,0 Z" fill="#eab308"/>
    
    <!-- Traditional Border -->
    <rect x="200" y="200" width="400" height="300" fill="#f97316"/>
    
    <!-- Corner Motifs -->
    <path d="M 50,50 L 80,50 L 80,0 Z" fill="#ca8a04"/>
    <path d="M 200,50 L 230,50 L 230,0 Z" fill="#eab308"/>
    
    <!-- Lord Ganesha Silhouette -->
    <circle cx="600" cy="150" r="40" fill="#f97316"/>
    
    <!-- Lamp with Soft Glow -->
    <rect x="200" y="200" width="400" height="200" fill="#ca8a04"/>
    <circle cx="250" cy="250" r="10" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="72">Anjaneya Deeksha</text>
</svg>
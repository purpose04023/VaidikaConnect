<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <defs>
        <pattern id="mandalaPattern" patternUnits="userSpaceOnUse">
            <circle cx="250" cy="250" r="150" stroke-width="10" stroke="#881337" fill="#f97316"/>
            <circle cx="450" cy="250" r="150" stroke-width="10" stroke="#881337" fill="#f97316"/>
        </pattern>
        
        <pattern id="borderPattern" patternUnits="userSpaceOnUse">
            <rect x="0" y="0" width="200" height="400" rx="50" ry="50" stroke-width="10" stroke="#881337" fill="#f97316"/>
        </pattern>
        
        <pattern id="cornerPattern" patternUnits="userSpaceOnUse">
            <rect x="200" y="200" width="40" height="40" rx="5" ry="5" stroke-width="10" stroke="#881337" fill="#f97316"/>
        </pattern>
    </defs>
    
    <!-- Wealth Representation -->
    <rect x="200" y="200" width="400" height="400" rx="50" ry="50" fill="gold" stroke-width="10" stroke="#881337"/>
    
    <!-- Lord Ganesha or Wealth Element -->
    <rect x="600" y="200" width="200" height="200" rx="50" ry="50" fill="#ca8a04" stroke-width="10" stroke="#881337"/>
    
    <!-- Diya with Glow Effect -->
    <rect x="600" y="200" width="200" height="200" rx="50" ry="50" fill="#f97316" stroke-width="10" stroke="#881337"/>
    <circle cx="600" cy="200" r="20" fill-opacity="0.5" stroke-width="10" stroke="#881337"/>
    
    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="60">Stacks of gold coins representing wealth</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <g>
        <path d="M 400,250 L 800,250 L 800,600 L 400,600 Z" fill="url(#pattern1)" />
        <rect x="390" y="270" width="100" height="100" fill="#ca8a04"/>
    </g>
    
    <!-- Traditional Border -->
    <path d="M 0,600 L 800,600 Z" fill="url(#pattern2)" />
    
    <!-- Corner Motifs -->
    <polygon points="350,100 750,100 750,400 350,400" fill="#881337"/>
    
    <!-- Lord Ganesha Silhouette -->
    <path d="M 200,60 L 600,60 Z" fill="url(#pattern3)" />
    
    <!-- Diya with Glow Effect -->
    <circle cx="450" cy="180" r="70" fill="#eab308"/>
    <filter id="glowEffect">
        <feGaussianBlur stdDeviation="20"/>
        <feColorMatrix type="matrix" values="0 0 0 0 0.5
                                            0 0 0 0 0.5
                                            0 0 0 0 0.5
                                            0 0 0 0 1"/>
    </filter>
    <circle cx="450" cy="180" r="70" fill="#eab308" filter="url(#glowEffect)"/>
    
    <!-- Text -->
    <text x="400" y="290" font-family="Serif" font-size="60">Married women performing a traditional ritual</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <defs>
        <!-- Palette -->
        <linearGradient id="palette">
            <stop offset="0%" stop-color="#f97316"/>
            <stop offset="50%" stop-color="#881337"/>
            <stop offset="100%" stop-color="#ca8a04"/>
        </linearGradient>
    </defs>

    <!-- Bride -->
    <rect x="20" y="20" width="660" height="560" fill="url(#palette)" />
    
    <!-- Geometric Patterns -->
    <path d="M 10,30 Q 40,70 80,30 Z" fill="#ca8a04"/>
    <path d="M 20,50 Q 60,90 100,50 Z" fill="#eab308"/>

    <!-- Lord Ganesha -->
    <rect x="70" y="200" width="100" height="100" fill="#f97316"/>
    
    <!-- Diya (Lamp) with Glow Effect -->
    <circle cx="450" cy="380" r="50" fill="#eab308"/>
</svg>
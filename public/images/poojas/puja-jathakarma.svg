<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 400,250 L 800,250 A 400,400 0 1 1 400,250" stroke="#ca8a04" fill="none"/>
    
    <!-- Traditional Border -->
    <rect x="0" y="0" width="800" height="600" rx="30" ry="30" fill="#881337"/>
    
    <!-- Corner Motifs -->
    <path d="M 40,250 L 40,550 A 40,40 0 1 1 80,550 A 40,40 0 1 1 80,250" fill="#ca8a04"/>
    <path d="M 760,250 L 760,550 A 40,40 0 1 1 800,550 A 40,40 0 1 1 800,250" fill="#ca8a04"/>
    
    <!-- Lord Ganesha -->
    <path d="M 300,300 L 600,300 A 300,300 0 1 1 300,300" stroke="#eab308" fill="none"/>
    
    <!-- Lamp with Glow -->
    <circle cx="450" cy="275" r="60" fill="#f97316"/>
    <path d="M 450,275 L 450,335 A 60,60 0 1 1 450,335 A 60,60 0 1 1 450,275" stroke="#eab308" fill="none"/>
    
    <!-- Text -->
    <text x="400" y="350" font-size="40">Jathakarma</text>
</svg>
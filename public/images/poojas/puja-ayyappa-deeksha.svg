<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    
    <!-- Forest Path -->
    <path d="M 400,200 L 500,200 A 100,100 0 1 1 500,300 L 500,300 A 100,100 0 1 1 600,400" fill="none" stroke="#881337"/>
    
    <!-- Geometric Patterns -->
    <rect x="200" y="100" width="200" height="50" rx="20" ry="20" fill="#ca8a04"/>
    <rect x="600" y="300" width="200" height="50" rx="20" ry="20" fill="#eab308"/>
    
    <!-- Lord Ganesha -->
    <circle cx="400" cy="150" r="70" fill="#f97316"/>
    
    <!-- Lamp with Glow Effect -->
    <g>
        <rect x="200" y="250" width="200" height="100" rx="20" ry="20" fill="#eab308"/>
        <circle cx="200" cy="270" r="40" fill="#f97316"/>
    </g>
    
    <!-- Text -->
    <text x="400" y="500" font-family="Serif" font-size="24">A serene forest path, representing the journey to Sabarimala</text>
</svg>
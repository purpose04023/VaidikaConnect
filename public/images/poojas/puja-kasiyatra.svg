<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Elements -->
    <g>
        <path d="M 400,50 L 200,150 L 800,150 Z" fill="#ca8a04"/>
        <path d="M 400,300 L 600,300 L 800,300 Z" fill="#eab308"/>
    </g>
    
    <!-- Mandala -->
    <circle cx="400" cy="250" r="150" fill="#ca8a04"/>
    <circle cx="400" cy="375" r="150" fill="#eab308"/>
    
    <!-- Traditional Border -->
    <rect x="0" y="0" width="100%" height="100%" fill="url(#borderGradient)"/>
    
    <!-- Corner Motifs -->
    <path d="M 40,50 L 20,90 L 80,90 Z" fill="#ca8a04"/>
    <path d="M 40,130 L 60,170 L 80,170 Z" fill="#eab308"/>
    
    <!-- Diya with Glow -->
    <g>
        <rect x="250" y="250" width="150" height="150" fill="#ca8a04"/>
        <circle cx="275" cy="275" r="10" fill="#eab308"/>
    </g>
    
    <!-- Text -->
    <text x="400" y="300" font-family="Serif" font-size="60">Kasiyatra</text>
</svg>
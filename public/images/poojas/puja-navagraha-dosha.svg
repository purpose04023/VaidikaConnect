<svg viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="25" y="25" fill="#f97316" stroke="#ca8a04"/>
    <rect x="25" y="50" fill="#eab308" stroke="#ca8a04"/>
    <rect x="25" y="75" fill="#f97316" stroke="#ca8a04"/>

    <!-- Mandala Pattern -->
    <path d="M 100,100 L 200,100 L 200,200 L 100,200 Z"
          fill="url(#pattern)"
          stroke="#ca8a04"/>

    <!-- Traditional Border -->
    <rect x="35" y="35" width="730" height="565" fill="none"/>
    <line x1="35" y1="35" x2="730" y2="35" stroke="#ca8a04"/>

    <!-- Corner Motifs -->
    <path d="M 10,10 L 20,10 L 20,20 Z"
          fill="url(#pattern)"
          stroke="#ca8a04"/>
    <path d="M 35,10 L 45,10 L 45,20 Z"
          fill="url(#pattern)"
          stroke="#ca8a04"/>

    <!-- Lord Ganesha Silhouette -->
    <circle cx="600" cy="300" r="70" fill="#f97316"/>
    <path d="M 592,300 L 592,310 L 608,310 Z"
          fill="url(#pattern)"
          stroke="#ca8a04"/>

    <!-- Lamp with Soft Glow -->
    <circle cx="600" cy="300" r="70" fill="#f97316"/>
    <path d="M 592,300 L 592,310 L 608,310 Z"
          fill="url(#pattern)"
          stroke="#ca8a04"/>

    <!-- Text -->
    <text x="400" y="370" font-family="Serif" font-size="24">Symbolic representation of the Navagrahas (nine planets)</text>
</svg>
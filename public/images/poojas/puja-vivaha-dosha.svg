<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <defs>
        <pattern id="mandala-pattern" patternUnits="userSpaceOnUse">
            <path d="M 50,400 L 200,400 A 150,150 0 1,1 350,250 Z"/>
        </pattern>
    </defs>

    <!-- Traditional Border -->
    <rect x="0" y="0" width="800" height="600" fill="#eab308"/>

    <!-- Corner Motifs -->
    <path d="M 10,200 L 90,200 A 70,70 0 1,1 80,130 Z"/>
    <path d="M 500,400 L 600,400 A 70,70 0 1,1 630,230 Z"/>

    <!-- Lord Ganesha Silhouette -->
    <rect x="10" y="10" width="780" height="580" fill="#ca8a04"/>
    
    <!-- Wedding Symbol -->
    <path d="M 10,10 L 20,10 A 10,10 0 1,1 30,20 Z"/>

    <!-- Diya with Soft Glow -->
    <g>
        <rect x="45" y="45" width="70" height="70" fill="#eab308"/>
        <circle cx="45" cy="45" r="6.5" fill-opacity=".2"/>
    </g>

    <!-- Text -->
    <text x="100" y="300" font-family="Serif" font-size="72" text-anchor="middle">Two hands joining during a wedding, symbolizing removal of obstacles</text>
    
</svg>
<svg viewBox="0 0 800 600" width="100%" height="100%">
    <rect x="0" y="0" width="800" height="600" fill="#f97316"/>
    <rect x="250" y="250" width="400" height="400" fill="#ca8a04"/>
    <rect x="400" y="400" width="400" height="400" fill="#eab308"/>

    <!-- Geometric Patterns -->
    <path d="M 250,150 L 600,150 A 200,200 0 1 1 600,350 Z"/>
    <path d="M 400,150 L 800,150 A 200,200 0 1 1 800,350 Z"/>

    <!-- Lord Ganesha Silhouette -->
    <circle cx="400" cy="300" r="70" fill="#881337"/>
    <path d="M 420,320 L 460,360 A 40,40 0 1 1 500,400 Z"
          fill="#ca8a04"/>

    <!-- Diya (Lamp) with Soft Glow -->
    <circle cx="700" cy="290" r="50" fill="#f97316"/>
    <path d="M 720,310 L 760,350 A 40,40 0 1 1 800,400 Z"
          fill="#eab308"/>

    <!-- Text -->
    <text x="400" y="350" font-family="Serif">A close-up of a Ganesha idol, symbolizing obstacle removal</text>
</svg>
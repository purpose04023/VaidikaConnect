<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect fill="#f97316" x="0" y="0" width="100%" height="100%"/>
    
    <!-- Main Element - Goddess Saraswati with Veena -->
    <g>
        <path d="M400 50 L200 50 A800,800 4 0 1 600 150 Q800,150 800,300" fill="#ca8a04"/>
        <path d="M400 50 L200 50 A800,800 4 0 1 600 150 Q800,150 800,300" fill="#eab308"/>
        <rect x="200" y="75" width="400" height="150" fill="#f97316"/>
    </g>
    
    <!-- Diya with Soft Glow -->
    <path d="M200 200 L400 200 A800,800 4 0 1 600 250 Q800,250 800,300" fill="#f97316"/>
    <circle cx="200" cy="200" r="50" fill="#eab308" stroke="#f97316"/>
    
    <!-- Text -->
    <text x="400" y="350" font-family="Serif" font-size="48">An idol of Goddess Saraswati with a veena</text>
    
    <!-- Additional Elements (optional) - Lord Ganesha or Veena Silhouette -->
    <!-- For example: 
        <path d="M120 300 L50 300 A700,700 4 0 1 600 250 Q800,250 800,300" fill="#f97316"/>
        <path d="M120 300 L50 300 A700,700 4 0 1 600 250 Q800,250 800,300" fill="#eab308"/>
    -->
</svg>
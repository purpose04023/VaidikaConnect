<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Top Border -->
    <rect x="0" y="25" width="800" height="4" rx="2" fill="#881337"/>
    
    <!-- Middle Border -->
    <rect x="0" y="50" width="800" height="4" rx="2" fill="#881337"/>
    
    <!-- Bottom Border -->
    <rect x="0" y="75" width="800" height="4" rx="2" fill="#881337"/>
    
    <!-- Diya with Glow Effect -->
    <circle cx="400" cy="300" r="100" fill="#ca8a04" stroke="#eab308" stroke-width="5" transform="translate(20, 20) rotate(-90)" filter="url(#glowFilter)">
        <animate attributeName="fill-opacity" from="1" to="0.7" dur="1s"/>
    </circle>
    
    <!-- Lord Ganesha Silhouette -->
    <path d="M450 300 L425 325 L400 350 L375 375 L350 350 L325 375 L300 350 L275 375 L250 350 Z" fill="none"/>
    
    <!-- Text -->
    <text x="400" y="360" font-family="Serif" font-size="18">Lord Ganesha idol for Sankatahara Chaturthi</text>
    
    <!-- Glow Filter -->
    <filter id="glowFilter">
        <feGaussianBlur stdDeviation="5"/>
        <feColorMatrix type="matrix" values="0.33 0 0 0 0
                                        0 0.33 0 0 0
                                        0 0 0.33 0 0
                                        0 0 0 1 0"/>
    </filter>
</svg>
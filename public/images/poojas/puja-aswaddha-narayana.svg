<svg viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 200,50 L 400,150 L 600,50 Z" fill="#881337"/>
    <path d="M 200,50 L 400,150 L 600,50 Z" fill="#ca8a04"/>
    
    <!-- Corner Motifs -->
    <rect x="0" y="0" width="100%" height="100%" rx="20" ry="20" fill="#eab308"/>
    
    <!-- Lord Ganesha Silhouette -->
    <path d="M 450,60 L 470,40 L 490,60 Z" fill="#f97316"/>
    
    <!-- Lamp with Soft Glow -->
    <circle cx="480" cy="200" r="50" fill="#eab308" stroke="#ca8a04" stroke-width="2"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <!-- Background -->
    <rect x="0" y="0" width="100%" height="100%" fill="#f97316"/>
    
    <!-- Geometric Patterns -->
    <path d="M 200,50 L 400,50 L 400,150 L 200,150 Z" fill="#881337"/>
    <path d="M 600,50 L 800,50 L 800,150 L 600,150 Z" fill="#ca8a04"/>
    
    <!-- Corner Motifs -->
    <rect x="200" y="30" width="200" height="100%" rx="30" ry="30" fill="#eab308"/>
    <rect x="600" y="30" width="200" height="100%" rx="30" ry="30" fill="#eab308"/>
    
    <!-- Lord Ganesha Silhouette -->
    <circle cx="400" cy="350" r="70" fill="#ca8a04"/>
    <path d="M 420,360 L 440,380 L 460,360 Z" fill="#eab308"/>
    
    <!-- Oil Lamp with Glow -->
    <circle cx="500" cy="370" r="100" fill="#f97316"/>
    <path d="M 520,380 L 540,400 L 560,380 Z" fill="#eab308"/>
    
    <!-- Text -->
    <text x="400" y="400" font-family="Serif" font-size="12">Oil lamps lit during Karthika masam</text>
</svg>